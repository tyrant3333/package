<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DESI SHIT - Watch Videos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d1a; color: #f0f0ff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0d0d1a; }
    ::-webkit-scrollbar-thumb { background: #7c5cfc; border-radius: 10px; }
    
    #telegramBanner {
      display: none; background: linear-gradient(135deg, #0088cc, #24a1de); color: white;
      padding: 12px 20px; text-align: center; position: relative; z-index: 200; font-size: 15px;
      font-weight: 500; box-shadow: 0 4px 20px rgba(0,136,204,0.4); align-items: center;
      justify-content: center; gap: 12px; flex-wrap: wrap;
    }
    #telegramBanner a { color: #fff; font-weight: 700; text-decoration: underline; margin: 0 4px; }
    #telegramBanner .close-banner {
      background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 18px; cursor: pointer;
      padding: 2px 10px; border-radius: 20px; transition: 0.2s; position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    }
    #telegramBanner .close-banner:hover { background: rgba(255,255,255,0.4); }
    @media (max-width: 600px) { #telegramBanner { font-size: 14px; padding: 10px 16px; } #telegramBanner .close-banner { right: 8px; } }

    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(13,13,26,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .logo i { color: #7c5cfc; }
    
    .hero { padding: 40px 40px 20px; max-width: 1440px; margin: 0 auto; }
    .hero .featured { background: linear-gradient(145deg, #18182e, #25254a); border-radius: 24px; padding: 30px; display: flex; align-items: center; gap: 40px; flex-wrap: wrap; border: 1px solid rgba(255,255,255,0.04); box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; }
    .hero .featured .thumb-container { flex: 1 1 300px; min-height: 220px; background: #2d2d44; border-radius: 16px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; }
    .hero .featured .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
    .hero .featured .thumb-container .play-icon { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 60px; color: #fff; opacity: 0.8; transition: 0.3s; }
    .hero .featured .thumb-container:hover .play-icon { opacity: 1; transform: scale(1.1); }
    .hero .featured .info { flex: 1 1 250px; }
    .hero .featured .info h2 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .hero .featured .info p { color: #a0a0c0; font-size: 16px; line-height: 1.6; }
    .hero .featured .info .tag { display: inline-block; margin-top: 12px; padding: 6px 16px; background: rgba(124,92,252,0.2); border-radius: 20px; font-size: 13px; color: #b8a9ff; }
    .empty-hero { width: 100%; text-align: center; padding: 50px 20px; color: #a0a0c0; }
    .empty-hero i { font-size: 48px; opacity: 0.3; display: block; margin-bottom: 16px; }
    .container { max-width: 1440px; margin: 0 auto; padding: 20px 40px 60px; }
    .grid-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .grid-header h2 { font-size: 24px; font-weight: 600; }
    .grid-header h2 i { color: #7c5cfc; margin-right: 10px; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px; }
    .video-card { background: #18182e; border-radius: 16px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.04); }
    .video-card:hover { transform: translateY(-6px); background: #22223e; border-color: rgba(124,92,252,0.25); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .video-card .thumb { width: 100%; aspect-ratio: 16/9; background: #2d2d44; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .video-card .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .video-card .thumb .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 40px; color: #fff; opacity: 0; transition: 0.3s; }
    .video-card:hover .thumb .overlay { opacity: 1; }
    .video-card .body { padding: 16px 18px; }
    .video-card .body h3 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .video-card .body .caption { color: #a0a0c0; font-size: 14px; line-height: 1.4; margin-bottom: 8px; }
    .video-card .footer { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #a0a0c0; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 10px; }
    .video-card .footer .date { display: flex; align-items: center; gap: 6px; }
    .empty-grid { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #a0a0c0; }
    .empty-grid i { font-size: 56px; opacity: 0.15; display: block; margin-bottom: 16px; }
    .toast { position: fixed; bottom: 30px; right: 30px; padding: 16px 28px; border-radius: 14px; font-size: 15px; font-weight: 500; z-index: 3000; transform: translateY(120px); opacity: 0; transition: 0.4s; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #00b894; color: #fff; }
    .toast.error { background: #e17055; color: #fff; }
    .toast.info { background: #7c5cfc; color: #fff; }
    @media (max-width: 768px) { header { padding: 14px 20px; } .hero { padding: 20px 20px 10px; } .hero .featured { flex-direction: column; padding: 20px; } .hero .featured .info h2 { font-size: 22px; } .container { padding: 10px 20px 40px; } .video-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; } }
  </style>
</head>
<body>

<div id="telegramBanner">
  <span><i class="fab fa-telegram-plane"></i> Join our Telegram Channel for updates: <a id="telegramLink" href="#" target="_blank">@your_channel</a></span>
  <button class="close-banner" id="closeBannerBtn"><i class="fas fa-times"></i></button>
</div>

<header>
  <div class="logo"><i class="fas fa-play-circle"></i> DESI SHIT</div>
</header>

<section class="hero" id="heroSection"></section>
<div class="container">
  <div class="grid-header"><h2><i class="fas fa-th-large"></i> Latest Videos</h2></div>
  <div class="video-grid" id="videoGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  (function() {
    const API_BASE = '/api/videos';
    const CONFIG_API = '/api/config';
    const videoGrid = document.getElementById('videoGrid');
    const heroSection = document.getElementById('heroSection');
    const toast = document.getElementById('toast');
    const banner = document.getElementById('telegramBanner');
    const closeBannerBtn = document.getElementById('closeBannerBtn');
    const telegramLink = document.getElementById('telegramLink');
    let videos = [];

    function showToast(msg, type='info') {
      toast.textContent = msg; toast.className = 'toast ' + type + ' show';
      clearTimeout(toast._t); toast._t = setTimeout(() => toast.classList.remove('show'), 3500);
    }

    async function loadConfig() {
      try {
        const res = await fetch(CONFIG_API);
        const config = await res.json();
        if (config.notificationEnabled) {
          if (config.telegramLink) {
            telegramLink.href = config.telegramLink;
            if (config.telegramLink.startsWith('@')) {
              telegramLink.href = 'https://t.me/' + config.telegramLink.substring(1);
              telegramLink.textContent = config.telegramLink;
            } else {
              telegramLink.textContent = config.telegramLink;
            }
          }
          const dismissed = localStorage.getItem('telegram_banner_dismissed');
          if (config.permanentNotification || dismissed !== 'true') {
            banner.style.display = 'flex';
          } else { banner.style.display = 'none'; }
        } else { banner.style.display = 'none'; }
      } catch (e) { console.warn('Config load error', e); }
    }

    closeBannerBtn.addEventListener('click', function() {
      banner.style.display = 'none';
      localStorage.setItem('telegram_banner_dismissed', 'true');
    });

    async function loadVideos() {
      try {
        const res = await fetch(API_BASE);
        videos = await res.json();
        renderUI();
      } catch (e) { showToast('⚠️ Error loading videos', 'error'); }
    }

    function escapeHtml(text) { if(!text) return ''; const d=document.createElement('div'); d.textContent=text; return d.innerHTML; }
    function formatDate(ts) {
      const d=new Date(ts); const now=new Date(); const diff=now-d;
      if(diff<60000) return 'Just now';
      if(diff<3600000) return Math.floor(diff/60000)+'m ago';
      if(diff<86400000) return Math.floor(diff/3600000)+'h ago';
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }

    function renderUI() {
      if(videos.length===0) {
        heroSection.innerHTML = `<div class="featured"><div class="empty-hero"><i class="fas fa-video"></i><h3>No videos yet</h3><p>Upload your first video from Admin Panel</p></div></div>`;
      } else {
        const latest = videos[0];
        const src = latest.telegramUrl || latest.fileUrl || '';
        heroSection.innerHTML = `
          <div class="featured">
            <div class="thumb-container" onclick="openVideo('${latest.id}')">
              <img src="${src}" alt="${latest.title}" onerror="this.style.display='none'" />
              <div class="play-icon"><i class="fas fa-play-circle"></i></div>
            </div>
            <div class="info">
              <h2>🔥 ${latest.title}</h2>
              <p>${latest.caption || 'No caption'}</p>
              <span class="tag"><i class="fas fa-star"></i> Featured</span>
            </div>
          </div>
        `;
      }

      if(videos.length===0) {
        videoGrid.innerHTML = `<div class="empty-grid"><i class="fas fa-film"></i><h3>No videos uploaded</h3><p>Upload from Admin Panel</p></div>`;
      } else {
        let html = '';
        videos.forEach(v => {
          const src = v.telegramUrl || v.fileUrl || '';
          html += `
            <div class="video-card" onclick="openVideo('${v.id}')">
              <div class="thumb">
                <img src="${src}" alt="${v.title}" onerror="this.style.display='none'" />
                <div class="overlay"><i class="fas fa-play"></i></div>
              </div>
              <div class="body">
                <h3>${escapeHtml(v.title)}</h3>
                <div class="caption">${escapeHtml(v.caption || '')}</div>
                <div class="footer">
                  <span class="date"><i class="far fa-eye"></i> ${v.views || 0} views • ${formatDate(v.uploadedAt)}</span>
                </div>
              </div>
            </div>
          `;
        });
        videoGrid.innerHTML = html;
      }
    }

    window.openVideo = function(id) {
      const v = videos.find(x => x.id === id);
      if (v) {
        const url = v.telegramUrl || v.fileUrl;
        if (url) {
          fetch('/api/videos/' + id + '/view', { method: 'POST' });
          window.open(url, '_blank');
        } else { showToast('Video not found', 'error'); }
      } else { showToast('Video not found', 'error'); }
    };

    loadConfig();
    loadVideos();
  })();
</script>
</body>
</html>
